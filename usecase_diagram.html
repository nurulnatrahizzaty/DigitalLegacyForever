<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Use Case Diagram – Legacy Digital Forever</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    h1  { color: #f8fafc; font-size: 1.8rem; margin-bottom: 4px; }
    .sub { color: #94a3b8; font-size: 0.9rem; margin-bottom: 16px; }
    .legend {
      display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .legend span {
      display: flex; align-items: center; gap: 8px;
      color: #cbd5e1; font-size: 0.82rem;
    }
    .dot { width: 13px; height: 13px; border-radius: 3px; }
    svg { border-radius: 16px; border: 1px solid #334155; max-width: 100%; }
  </style>
</head>
<body>

<h1>Use Case Diagram</h1>
<p class="sub">Legacy Digital Forever &nbsp;·&nbsp; User &nbsp;·&nbsp; Admin &nbsp;·&nbsp; Beneficiary</p>

<div class="legend">
  <span><div class="dot" style="background:#3b82f6"></div> User</span>
  <span><div class="dot" style="background:#a855f7"></div> Admin</span>
  <span><div class="dot" style="background:#10b981"></div> Beneficiary</span>
  <span><div class="dot" style="background:#475569"></div> Shared</span>
</div>

<svg id="svg" width="1440" height="820" style="background:#1e293b;"></svg>

<script>
const NS  = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

// helper
function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}
function add(e) { svg.appendChild(e); return e; }

/* ── DEFS: arrowhead ─────────────────────────────────────── */
const defs = add(el('defs', {}));
const mk   = el('marker', { id:'arr', markerWidth:8, markerHeight:6,
                             refX:7, refY:3, orient:'auto' });
mk.appendChild(el('path', { d:'M0,0 L0,6 L8,3 z', fill:'#64748b' }));
defs.appendChild(mk);

/* ── SYSTEM BOUNDARY ─────────────────────────────────────── */
// Box: x=160 y=30 w=1120 h=760
add(el('rect', { x:160, y:30, width:1120, height:760, rx:10,
  fill:'none', stroke:'#475569', 'stroke-width':2, 'stroke-dasharray':'10,5' }));

// System label at top-left corner
add(el('text', { x:168, y:22, fill:'#64748b', 'font-size':13,
  'font-family':'Segoe UI', 'font-style':'italic' },
  'Legacy Digital Forever System'));

/* ── COLUMN DIVIDERS ─────────────────────────────────────── */
// 3 columns: x 160-555 | 555-940 | 940-1280
add(el('line', { x1:555, y1:38, x2:555, y2:782,
  stroke:'#334155', 'stroke-width':1, 'stroke-dasharray':'5,4' }));
add(el('line', { x1:940, y1:38, x2:940, y2:782,
  stroke:'#334155', 'stroke-width':1, 'stroke-dasharray':'5,4' }));

/* ── COLUMN HEADERS ──────────────────────────────────────── */
const headers = [
  { x:357,  label:'USER',         color:'#60a5fa' },
  { x:747,  label:'ADMIN',        color:'#c084fc' },
  { x:1110, label:'BENEFICIARY',  color:'#34d399' },
];
for (const h of headers) {
  add(el('text', { x:h.x, y:58, 'text-anchor':'middle',
    fill:h.color, 'font-size':11, 'font-weight':'bold',
    'font-family':'Segoe UI', 'letter-spacing':2 }, h.label));
}

/* ── USE CASES ───────────────────────────────────────────── */
const RX = 108, RY = 23;

// Each use case: id, cx, cy, label, fill, stroke, textColor
const usecases = [

  // ── USER (col center x=357, y gap=90, start y=105) ──────
  { id:'U1', cx:357, cy:105,
    label:'Register Account',
    fill:'#1e3a8a', stroke:'#93c5fd', tc:'#dbeafe' },
  { id:'U2', cx:357, cy:200,
    label:'Login / Logout',
    fill:'#1e3a8a', stroke:'#93c5fd', tc:'#dbeafe' },
  { id:'U3', cx:357, cy:295,
    label:'Manage Profile',
    fill:'#1e3a8a', stroke:'#93c5fd', tc:'#dbeafe' },
  { id:'U4', cx:357, cy:390,
    label:'Connect Social Accounts',
    fill:'#1e3a8a', stroke:'#93c5fd', tc:'#dbeafe' },
  { id:'U5', cx:357, cy:485,
    label:'Set Security PIN',
    fill:'#1e3a8a', stroke:'#93c5fd', tc:'#dbeafe' },
  { id:'U6', cx:357, cy:565,
    label:'View Social Media Passwords',
    fill:'#1e3a8a', stroke:'#f59e0b', tc:'#fef3c7',
    note:'PIN required' },
  { id:'U7', cx:357, cy:645,
    label:'Update Social Media Passwords',
    fill:'#1e3a8a', stroke:'#f59e0b', tc:'#fef3c7',
    note:'PIN required' },
  { id:'U8', cx:357, cy:715,
    label:'Manage Family Members',
    fill:'#1e3a8a', stroke:'#93c5fd', tc:'#dbeafe' },

  // ── ADMIN (col center x=747, y gap=90, start y=105) ──────
  { id:'A1', cx:747, cy:105,
    label:'Login / Logout',
    fill:'#3b0764', stroke:'#d8b4fe', tc:'#ede9fe' },
  { id:'A2', cx:747, cy:200,
    label:'View Dashboard & Statistics',
    fill:'#3b0764', stroke:'#d8b4fe', tc:'#ede9fe' },
  { id:'A3', cx:747, cy:295,
    label:'Manage All Users',
    fill:'#3b0764', stroke:'#d8b4fe', tc:'#ede9fe' },
  { id:'A4', cx:747, cy:390,
    label:'Manage Inactive Users',
    fill:'#3b0764', stroke:'#d8b4fe', tc:'#ede9fe' },
  { id:'A5', cx:747, cy:485,
    label:'Review Emergency Requests',
    fill:'#3b0764', stroke:'#d8b4fe', tc:'#ede9fe' },
  { id:'A6', cx:747, cy:580,
    label:'Approve Beneficiary',
    fill:'#3b0764', stroke:'#d8b4fe', tc:'#ede9fe' },
  { id:'A7', cx:747, cy:665,
    label:'Reject Beneficiary',
    fill:'#3b0764', stroke:'#d8b4fe', tc:'#ede9fe' },
  { id:'A8', cx:747, cy:745,
    label:'View Audit Log & Send Email',
    fill:'#3b0764', stroke:'#d8b4fe', tc:'#ede9fe' },

  // ── BENEFICIARY (col center x=1110, y gap=100, start y=120)
  { id:'B1', cx:1110, cy:120,
    label:'Access Emergency Gateway',
    fill:'#064e3b', stroke:'#6ee7b7', tc:'#d1fae5' },
  { id:'B2', cx:1110, cy:230,
    label:'Submit Request + Upload PDF',
    fill:'#064e3b', stroke:'#6ee7b7', tc:'#d1fae5' },
  { id:'B3', cx:1110, cy:340,
    label:'Beneficiary Login',
    fill:'#064e3b', stroke:'#6ee7b7', tc:'#d1fae5' },
  { id:'B4', cx:1110, cy:450,
    label:'View Request Status',
    fill:'#064e3b', stroke:'#6ee7b7', tc:'#d1fae5' },
  { id:'B5', cx:1110, cy:560,
    label:'View Approved Social Accounts',
    fill:'#064e3b', stroke:'#6ee7b7', tc:'#d1fae5' },
  { id:'B6', cx:1110, cy:660,
    label:'Verify PIN – Reveal Credentials',
    fill:'#064e3b', stroke:'#f59e0b', tc:'#fef3c7',
    note:'PIN required' },
  { id:'B7', cx:1110, cy:750,
    label:'Family Emergency Token Access',
    fill:'#064e3b', stroke:'#6ee7b7', tc:'#d1fae5' },
];

const ucMap = {};
for (const u of usecases) ucMap[u.id] = u;

/* ── ACTORS ──────────────────────────────────────────────── */
const actors = [
  { id:'User',
    cx:75, cy:420, color:'#60a5fa',
    ucs:['U1','U2','U3','U4','U5','U6','U7','U8'] },
  { id:'Admin',
    cx:1380, cy:240, color:'#c084fc',
    ucs:['A1','A2','A3','A4','A5','A6','A7','A8'] },
  { id:'Beneficiary',
    cx:1380, cy:620, color:'#34d399',
    ucs:['B1','B2','B3','B4','B5','B6','B7'] },
];

const actorMap = {};
for (const a of actors) actorMap[a.id] = a;

/* ── DRAW CONNECTION LINES (drawn first = behind ovals) ───── */
for (const actor of actors) {
  for (const ucId of actor.ucs) {
    const uc    = ucMap[ucId];
    const left  = actor.cx < uc.cx;
    const edgeX = left ? uc.cx - RX : uc.cx + RX;
    add(el('line', {
      x1: actor.cx, y1: actor.cy,
      x2: edgeX,    y2: uc.cy,
      stroke:'#2d3f55', 'stroke-width':1.2,
    }));
  }
}

/* ── INCLUDE / EXTEND ARROWS (dashed, behind ovals) ─────── */
const relationships = [
  // View social passwords <<include>> Set Security PIN
  { from:'U6', to:'U5', label:'<<include>>' },
  // Update social passwords <<include>> Set Security PIN
  { from:'U7', to:'U5', label:'<<include>>' },
  // Approve beneficiary <<extend>> Review emergencies
  { from:'A6', to:'A5', label:'<<extend>>' },
  // Reject beneficiary <<extend>> Review emergencies
  { from:'A7', to:'A5', label:'<<extend>>' },
  // Reveal credentials <<include>> View approved accounts
  { from:'B6', to:'B5', label:'<<include>>' },
];

for (const r of relationships) {
  const f  = ucMap[r.from];
  const t  = ucMap[r.to];
  const mx = (f.cx + t.cx) / 2;
  const my = (f.cy + t.cy) / 2;
  // dashed arrow from f to t (connect bottom of f to top of t since they're in same column)
  add(el('line', {
    x1: f.cx + 40, y1: f.cy - RY,
    x2: t.cx + 40, y2: t.cy + RY,
    stroke:'#64748b', 'stroke-width':1.3,
    'stroke-dasharray':'5,3',
    'marker-end':'url(#arr)',
  }));
  // label background
  add(el('rect', {
    x: mx + 42, y: my - 9,
    width:62, height:14, rx:3,
    fill:'#0f172a',
  }));
  add(el('text', {
    x: mx + 73, y: my + 2,
    'text-anchor':'middle',
    fill:'#64748b', 'font-size':9,
    'font-family':'Segoe UI', 'font-style':'italic',
  }, r.label));
}

/* ── DRAW USE CASE OVALS ─────────────────────────────────── */
for (const uc of usecases) {
  add(el('ellipse', {
    cx: uc.cx, cy: uc.cy, rx: RX, ry: RY,
    fill: uc.fill, stroke: uc.stroke, 'stroke-width': 1.8,
  }));
  add(el('text', {
    x: uc.cx, y: uc.cy + 4,
    'text-anchor':'middle', 'dominant-baseline':'middle',
    fill: uc.tc, 'font-size': 10.5,
    'font-family':'Segoe UI', 'font-weight':'500',
  }, uc.label));
}

/* ── DRAW ACTORS (stick figures) ─────────────────────────── */
function drawActor(cx, cy, label, color) {
  const HR  = 16;
  const hcy = cy - 50;
  add(el('circle', { cx, cy:hcy, r:HR,
    fill:'none', stroke:color, 'stroke-width':2.2 }));
  // body
  add(el('line', { x1:cx, y1:hcy+HR, x2:cx, y2:cy+12,
    stroke:color, 'stroke-width':2.2 }));
  // arms
  add(el('line', { x1:cx-22, y1:cy-16, x2:cx+22, y2:cy-16,
    stroke:color, 'stroke-width':2.2 }));
  // legs
  add(el('line', { x1:cx, y1:cy+12, x2:cx-18, y2:cy+42,
    stroke:color, 'stroke-width':2.2 }));
  add(el('line', { x1:cx, y1:cy+12, x2:cx+18, y2:cy+42,
    stroke:color, 'stroke-width':2.2 }));
  // name label
  add(el('text', { x:cx, y:cy+60, 'text-anchor':'middle',
    fill:color, 'font-size':13, 'font-weight':'700',
    'font-family':'Segoe UI' }, label));
}

for (const a of actors) drawActor(a.cx, a.cy, a.id, a.color);

/* ── PIN LEGEND NOTE ─────────────────────────────────────── */
add(el('rect', { x:162, y:790, width:260, height:20, rx:4, fill:'#1e293b' }));
add(el('text', { x:170, y:804, fill:'#78716c',
  'font-size':10, 'font-family':'Segoe UI', 'font-style':'italic' },
  '  Amber border = PIN verification required before access'));

</script>
</body>
</html>
